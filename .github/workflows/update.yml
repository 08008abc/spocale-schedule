name: Update sports schedule

on:
  schedule:
    - cron: "5 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Update schedule
        run: python scripts/update_from_spocale.py

      - name: Commit updated schedule
        run: |
          git config user.name "schedule-bot"
          git config user.email "schedule-bot@example.com"
          git add data/schedule.json
          git diff --cached --quiet || git commit -m "Update sports schedule"
          git push
