name: Update sports schedule

on:
  schedule:
    # 15:05 UTC = 00:05 JST
    - cron: "5 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/update_from_spocale.py
      - name: Commit updated schedule
        run: |
          git config user.name "schedule-bot"
          git config user.email "schedule-bot@example.com"
          git add data/schedule.json
          git diff --cached --quiet || git commit -m "Update schedule"
          git push
