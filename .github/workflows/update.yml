name: Update Spocale Schedule

on:
  schedule:
    # 日本時間 0:05 に実行します。
    # GitHub Actions の cron は UTC なので、日本時間0:05 = UTC前日15:05 です。
    - cron: "5 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update schedule
        run: python scripts/update_from_spocale.py

      - name: Commit and push if changed
        run: |
          git config user.name "schedule-bot"
          git config user.email "schedule-bot@example.com"
          git add data/schedule.json
          git diff --cached --quiet || git commit -m "Update Spocale daily schedule"
          git push
